# Dependabot configuration for CI and the embedded Rust wrapper.
# Python dependencies remain manual here; GitHub Actions and Cargo updates
# are tracked in-repo.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "cargo"
    directory: "/voice-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
